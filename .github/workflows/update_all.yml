name: Update All Sources

on:
  workflow_dispatch:   # manual trigger only

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch YC companies
        run: python fetch_yc.py

      - name: Fetch crypto signals
        run: python fetch_crypto.py

      - name: Fetch top 1000 MCap crypto
        run: python fetch_crypto_top.py

      - name: Fetch seed funding news
        run: python fetch_seed.py

      - name: Commit and push if data changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update all sources $(date -u +%Y-%m-%d)"
            git pull --rebase -X theirs origin main || true
            git push
          fi
