name: Update Job Boards (Daily)

on:
  schedule:
    - cron: "0 9 * * *"   # 9 AM UTC every day
  workflow_dispatch:       # also allow manual trigger

permissions:
  contents: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch job board postings
        run: python fetch_jobs.py

      - name: Commit and push if data changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/jobs_snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update job boards $(date -u +%Y-%m-%d)"
            git pull --rebase -X theirs origin main || true
            git push
          fi
