name: Update Form D Leads

on:
  schedule:
    - cron: "0 9 * * *"   # 9 AM UTC daily
  workflow_dispatch:        # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Form D leads
        run: python fetch_leads.py

      - name: Fetch YC companies
        run: python fetch_yc.py

      - name: Fetch crypto signals
        run: python fetch_crypto.py

      - name: Fetch Show HN posts
        run: python fetch_hn.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.json data/yc.json data/crypto.json data/hn.json data/crypto_enrichment_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leads $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
