name: Update Signals

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch WAAS designer jobs
        run: python fetch_waas.py

      - name: Fetch CryptoRank funding rounds
        run: python fetch_cryptorank.py
        env:
          CRYPTORANK_API_KEY: ${{ secrets.CRYPTORANK_API_KEY }}

      - name: Commit and push if data changed
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update signals data $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi
