<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form D Lead Gen — Design Agency</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --orange: #f0883e;
    --gray: #6e7681;
    --red: #f85149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  header .meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .filters {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filters label {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .filters input[type="text"] {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    width: 220px;
    outline: none;
  }
  .filters input[type="text"]:focus {
    border-color: var(--accent);
  }
  .filters input[type="text"]::placeholder {
    color: var(--text-muted);
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .btn-group button {
    background: var(--bg3);
    border: none;
    color: var(--text-muted);
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    border-right: 1px solid var(--border);
    transition: background 0.15s, color 0.15s;
  }
  .btn-group button:last-child { border-right: none; }
  .btn-group button:hover { background: var(--border); color: var(--text); }
  .btn-group button.active {
    background: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }

  .main { padding: 20px 24px; }

  .stats {
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .stats span { color: var(--text); font-weight: 600; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }

  td {
    padding: 10px 14px;
    vertical-align: top;
  }

  .company-name {
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
  }
  .company-name:hover { text-decoration: underline; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-green  { background: rgba(63,185,80,.15);  color: var(--green); }
  .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
  .badge-orange { background: rgba(240,136,62,.15); color: var(--orange); }
  .badge-gray   { background: rgba(110,118,129,.15); color: var(--gray); }

  .amount { font-variant-numeric: tabular-nums; white-space: nowrap; }

  .location { color: var(--text-muted); white-space: nowrap; }

  .founders-list { display: flex; flex-direction: column; gap: 4px; }
  .founder-row   { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .founder-name  { font-weight: 500; }
  .founder-links { display: flex; gap: 4px; }
  .founder-link  {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    text-decoration: none;
    white-space: nowrap;
  }
  .founder-link:hover { color: var(--text); border-color: var(--accent); }

  .industry-chip {
    display: inline-block;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--text-muted);
    border: 1px solid var(--border);
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
  }
  .loading-dot {
    display: inline-block;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }

  @media (max-width: 700px) {
    .filters { flex-direction: column; align-items: flex-start; }
    .filters input[type="text"] { width: 100%; }
    .main { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>Form D Lead Gen</h1>
  <div class="meta" id="meta">Loading…</div>
</header>

<div class="filters">
  <div class="filter-group">
    <input type="text" id="search" placeholder="Search company or founder…" autocomplete="off">
  </div>

  <div class="filter-group">
    <label>Filed within</label>
    <div class="btn-group" id="days-filter">
      <button data-days="7">7d</button>
      <button data-days="14">14d</button>
      <button data-days="30" class="active">30d</button>
      <button data-days="60">60d</button>
    </div>
  </div>

  <div class="filter-group">
    <label>Raise size</label>
    <div class="btn-group" id="amount-filter">
      <button data-amount="all" class="active">All</button>
      <button data-amount="small">&lt;$500K</button>
      <button data-amount="mid">$500K–$3M</button>
      <button data-amount="large">$3M–$15M</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="table-wrap">
    <div class="loading" id="loading">
      <span class="loading-dot">●</span>
      <span class="loading-dot" style="animation-delay:.2s">●</span>
      <span class="loading-dot" style="animation-delay:.4s">●</span>
    </div>
    <table id="leads-table" style="display:none">
      <thead>
        <tr>
          <th data-col="company">Company <span class="sort-icon">↕</span></th>
          <th data-col="filed_date" class="sorted">Filed <span class="sort-icon">↓</span></th>
          <th data-col="amount">Amount <span class="sort-icon">↕</span></th>
          <th data-col="industry">Industry <span class="sort-icon">↕</span></th>
          <th data-col="location">Location <span class="sort-icon">↕</span></th>
          <th>Founders</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty" style="display:none">
      <h2>No leads match your filters</h2>
      <p>Try widening the date range or clearing the search.</p>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allLeads = [];
let sortCol = "filed_date";
let sortAsc = false;
let filterDays = 30;
let filterAmount = "all";
let searchText = "";
const today = new Date();
today.setHours(0, 0, 0, 0);

// ── Helpers ───────────────────────────────────────────────────────────────────
function daysAgo(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return Math.floor((today - d) / 86400000);
}

function urgencyBadge(days) {
  if (days <= 7)  return `<span class="badge badge-green">${days}d ago</span>`;
  if (days <= 14) return `<span class="badge badge-yellow">${days}d ago</span>`;
  if (days <= 30) return `<span class="badge badge-orange">${days}d ago</span>`;
  return `<span class="badge badge-gray">${days}d ago</span>`;
}

function fmtAmount(n) {
  if (!n || n === 0) return '<span style="color:var(--text-muted)">—</span>';
  if (n >= 1_000_000) return `$${(n / 1_000_000).toFixed(1)}M`;
  if (n >= 1_000)     return `$${(n / 1_000).toFixed(0)}K`;
  return `$${n.toLocaleString()}`;
}

function liLink(name) {
  const q = encodeURIComponent(name + " founder");
  return `https://www.linkedin.com/search/results/all/?keywords=${q}`;
}

function googleLink(name, company) {
  const q = encodeURIComponent(`"${name}" "${company}"`);
  return `https://www.google.com/search?q=${q}`;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Filtering & Sorting ───────────────────────────────────────────────────────
function applyFilters() {
  return allLeads.filter(lead => {
    const days = daysAgo(lead.filed_date);
    if (days > filterDays) return false;

    if (filterAmount === "small" && lead.amount >= 500_000) return false;
    if (filterAmount === "mid"   && (lead.amount < 500_000 || lead.amount > 3_000_000)) return false;
    if (filterAmount === "large" && (lead.amount < 3_000_000 || lead.amount > 15_000_000)) return false;

    if (searchText) {
      const hay = [
        lead.company,
        lead.industry,
        lead.city,
        lead.state,
        ...(lead.founders || []).map(f => f.name),
      ].join(" ").toLowerCase();
      if (!hay.includes(searchText)) return false;
    }

    return true;
  });
}

function sortLeads(arr) {
  return [...arr].sort((a, b) => {
    let av = a[sortCol] ?? "";
    let bv = b[sortCol] ?? "";
    if (sortCol === "amount") { av = av || 0; bv = bv || 0; }
    if (sortCol === "location") { av = `${a.city} ${a.state}`; bv = `${b.city} ${b.state}`; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderRow(lead) {
  const days = daysAgo(lead.filed_date);
  const location = [lead.city, lead.state].filter(Boolean).join(", ") || "—";

  const foundersHtml = (lead.founders || []).slice(0, 3).map(f => {
    if (!f.name) return "";
    const name = escapeHtml(f.name);
    const company = escapeHtml(lead.company);
    return `<div class="founder-row">
      <span class="founder-name">${name}</span>
      <div class="founder-links">
        <a class="founder-link" href="${liLink(f.name)}" target="_blank" rel="noopener">LI</a>
        <a class="founder-link" href="${googleLink(f.name, lead.company)}" target="_blank" rel="noopener">G</a>
      </div>
    </div>`;
  }).join("");

  const edgarUrl = escapeHtml(lead.filing_url || `https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=${lead.cik}&type=D`);

  return `<tr>
    <td><a class="company-name" href="${edgarUrl}" target="_blank" rel="noopener">${escapeHtml(lead.company || "—")}</a></td>
    <td>${urgencyBadge(days)}</td>
    <td class="amount">${fmtAmount(lead.amount)}</td>
    <td><span class="industry-chip" title="${escapeHtml(lead.industry || "")}">${escapeHtml(lead.industry || "—")}</span></td>
    <td class="location">${escapeHtml(location)}</td>
    <td><div class="founders-list">${foundersHtml || '<span style="color:var(--text-muted)">—</span>'}</div></td>
  </tr>`;
}

function render() {
  const filtered = sortLeads(applyFilters());
  const tbody = document.getElementById("tbody");
  const table = document.getElementById("leads-table");
  const empty = document.getElementById("empty");

  document.getElementById("stats").innerHTML =
    `Showing <span>${filtered.length}</span> of <span>${allLeads.length}</span> leads`;

  if (filtered.length === 0) {
    table.style.display = "none";
    empty.style.display = "block";
    return;
  }

  table.style.display = "table";
  empty.style.display = "none";
  tbody.innerHTML = filtered.map(renderRow).join("");
}

// ── Sort headers ──────────────────────────────────────────────────────────────
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = col !== "filed_date"; // dates default desc
    }
    document.querySelectorAll("thead th").forEach(t => {
      t.classList.remove("sorted");
      const icon = t.querySelector(".sort-icon");
      if (icon) icon.textContent = "↕";
    });
    th.classList.add("sorted");
    const icon = th.querySelector(".sort-icon");
    if (icon) icon.textContent = sortAsc ? "↑" : "↓";
    render();
  });
});

// ── Filter buttons ────────────────────────────────────────────────────────────
document.getElementById("days-filter").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  filterDays = parseInt(btn.dataset.days);
  document.querySelectorAll("#days-filter button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
});

document.getElementById("amount-filter").addEventListener("click", e => {
  const btn = e.target.closest("button");
  if (!btn) return;
  filterAmount = btn.dataset.amount;
  document.querySelectorAll("#amount-filter button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  render();
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  searchText = e.target.value.toLowerCase().trim();
  render();
});

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch("./data/leads.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allLeads = data.leads || [];

    const genAt = data.generated_at
      ? new Date(data.generated_at).toLocaleString()
      : "unknown";
    document.getElementById("meta").textContent =
      `${data.count} leads · updated ${genAt}`;

    document.getElementById("loading").style.display = "none";
    render();
  } catch (err) {
    document.getElementById("loading").innerHTML =
      `<div style="color:var(--red)">Failed to load leads.json: ${err.message}<br>
      <small style="color:var(--text-muted)">Run <code>python fetch_leads.py</code> to generate data, then serve with <code>python -m http.server</code></small></div>`;
  }
}

loadData();
</script>
</body>
</html>
